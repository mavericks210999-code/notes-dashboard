<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratchpad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body { -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const STORAGE_KEY = 'scratchpad:data';

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : { notes: [], theme: 'light' };
      } catch { return { notes: [], theme: 'light' }; }
    }

    function saveData(notes, theme) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ notes, theme }));
      } catch {}
    }

    function genId() {
      return `n${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
    }

    function formatTs() {
      const d = new Date();
      const today = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      const noteDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      if (noteDay.getTime() === today.getTime()) return `Today · ${time}`;
      if (noteDay.getTime() === yesterday.getTime()) return 'Yesterday';
      return d.toLocaleDateString([], { weekday: 'short' });
    }

    function truncate(s, n = 40) {
      const firstLine = (s || '').split('\n')[0].trim();
      if (!firstLine) return 'Untitled';
      return firstLine.length > n ? firstLine.slice(0, n).trimEnd() + '…' : firstLine;
    }

    function IconChevronRight({ size = 18 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="9 6 15 12 9 18" />
        </svg>
      );
    }
    function IconChevronLeft({ size = 18 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="15 6 9 12 15 18" />
        </svg>
      );
    }
    function IconTrash({ size = 14 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M4 7h16" />
          <path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
          <path d="M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-12" />
        </svg>
      );
    }
    function IconPlus({ size = 16 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      );
    }
    function IconSun({ size = 16 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="4" />
          <line x1="12" y1="3" x2="12" y2="5" /><line x1="12" y1="19" x2="12" y2="21" />
          <line x1="3" y1="12" x2="5" y2="12" /><line x1="19" y1="12" x2="21" y2="12" />
          <line x1="5.6" y1="5.6" x2="7" y2="7" /><line x1="17" y1="17" x2="18.4" y2="18.4" />
          <line x1="5.6" y1="18.4" x2="7" y2="17" /><line x1="17" y1="7" x2="18.4" y2="5.6" />
        </svg>
      );
    }
    function IconMoon({ size = 16 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
        </svg>
      );
    }

    function Scratchpad() {
      const initial = React.useMemo(() => loadData(), []);

      const [theme, setTheme] = React.useState(initial.theme || 'light');
      const [open, setOpen] = React.useState(false);
      const [notes, setNotes] = React.useState(initial.notes || []);
      const [activeId, setActiveId] = React.useState(null);
      const [text, setText] = React.useState('');
      const [hoverId, setHoverId] = React.useState(null);
      const [pendingDelete, setPendingDelete] = React.useState(null);
      const undoTimer = React.useRef(null);
      const taRef = React.useRef(null);

      // Refs for beforeunload (always has fresh values)
      const textRef = React.useRef(text);
      const activeIdRef = React.useRef(activeId);
      const notesRef = React.useRef(notes);
      const themeRef = React.useRef(theme);
      React.useEffect(() => { textRef.current = text; }, [text]);
      React.useEffect(() => { activeIdRef.current = activeId; }, [activeId]);
      React.useEffect(() => { notesRef.current = notes; }, [notes]);
      React.useEffect(() => { themeRef.current = theme; }, [theme]);

      // Save theme changes immediately
      React.useEffect(() => {
        saveData(notesRef.current, theme);
      }, [theme]);

      // Save text to history on exit
      React.useEffect(() => {
        const handleUnload = () => {
          const t = textRef.current.trim();
          const currentNotes = notesRef.current;
          const aid = activeIdRef.current;
          let updated;
          if (!t) {
            // nothing typed — still persist theme
            saveData(currentNotes, themeRef.current);
            return;
          }
          const ts = formatTs();
          if (aid) {
            updated = currentNotes.map(n =>
              n.id === aid ? { ...n, body: textRef.current, title: textRef.current, ts } : n
            );
          } else {
            const newNote = { id: genId(), title: textRef.current, body: textRef.current, ts };
            updated = [newNote, ...currentNotes];
          }
          saveData(updated, themeRef.current);
        };
        window.addEventListener('beforeunload', handleUnload);
        return () => window.removeEventListener('beforeunload', handleUnload);
      }, []);

      React.useEffect(() => {
        if (taRef.current) taRef.current.focus();
      }, []);

      const isDark = theme === 'dark';

      const palette = isDark ? {
        bg: '#131311',
        fg: 'rgba(235,232,224,0.92)',
        muted: 'rgba(235,232,224,0.50)',
        faint: 'rgba(235,232,224,0.30)',
        line: 'rgba(235,232,224,0.08)',
        sidebarBg: '#131311',
        activeBg: 'rgba(235,232,224,0.06)',
        hoverBg: 'rgba(235,232,224,0.035)',
        accent: '#d6c9a8',
      } : {
        bg: '#ffffff',
        fg: 'rgba(20,20,22,0.92)',
        muted: 'rgba(20,20,22,0.50)',
        faint: 'rgba(20,20,22,0.34)',
        line: 'rgba(20,20,22,0.07)',
        sidebarBg: '#fafafa',
        activeBg: 'rgba(20,20,22,0.055)',
        hoverBg: 'rgba(20,20,22,0.03)',
        accent: '#2a2a2e',
      };

      const selectNote = (n) => {
        setActiveId(n.id);
        setText(n.body);
        if (taRef.current) taRef.current.focus();
      };

      const requestDelete = (n) => {
        const idx = notes.findIndex(x => x.id === n.id);
        const updated = notes.filter(x => x.id !== n.id);
        setNotes(updated);
        saveData(updated, theme);
        if (activeId === n.id) { setActiveId(null); setText(''); }
        setPendingDelete({ note: n, index: idx });
        if (undoTimer.current) clearTimeout(undoTimer.current);
        undoTimer.current = setTimeout(() => setPendingDelete(null), 4000);
      };

      const undoDelete = () => {
        if (!pendingDelete) return;
        const { note, index } = pendingDelete;
        const next = [...notes];
        next.splice(Math.min(index, next.length), 0, note);
        setNotes(next);
        saveData(next, theme);
        setPendingDelete(null);
        if (undoTimer.current) clearTimeout(undoTimer.current);
      };

      const newNote = () => {
        setActiveId(null);
        setText('');
        if (taRef.current) taRef.current.focus();
      };

      const btnStyle = (extra = {}) => ({
        appearance: 'none', background: 'transparent', border: 'none',
        color: palette.muted, cursor: 'pointer',
        width: 28, height: 28, borderRadius: 6,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'color 140ms, background 140ms',
        ...extra,
      });

      return (
        <div style={{
          position: 'relative', width: '100%', height: '100%',
          background: palette.bg, color: palette.fg,
          fontFamily: '"Inter", ui-sans-serif, system-ui, sans-serif',
          overflow: 'hidden', display: 'flex',
        }}>
          {/* Sidebar */}
          <aside aria-label="History" style={{
            position: 'relative', flex: '0 0 auto',
            width: open ? 280 : 44,
            transition: 'width 360ms cubic-bezier(.2,.7,.2,1)',
            borderRight: `1px solid ${open ? palette.line : 'transparent'}`,
            background: open ? palette.sidebarBg : palette.bg,
            display: 'flex', flexDirection: 'column', zIndex: 2,
          }}>
            {/* Top bar */}
            <div style={{
              height: 44, display: 'flex', alignItems: 'center',
              padding: open ? '0 10px 0 14px' : '0',
              justifyContent: open ? 'space-between' : 'center',
            }}>
              <button
                onClick={() => setOpen(o => !o)}
                aria-label={open ? 'Collapse history' : 'Expand history'}
                style={btnStyle()}
                onMouseEnter={e => { e.currentTarget.style.color = palette.fg; e.currentTarget.style.background = palette.hoverBg; }}
                onMouseLeave={e => { e.currentTarget.style.color = palette.muted; e.currentTarget.style.background = 'transparent'; }}
              >
                {open ? <IconChevronLeft /> : <IconChevronRight />}
              </button>
              {open && (
                <button
                  onClick={newNote}
                  aria-label="New note"
                  style={btnStyle()}
                  onMouseEnter={e => { e.currentTarget.style.color = palette.fg; e.currentTarget.style.background = palette.hoverBg; }}
                  onMouseLeave={e => { e.currentTarget.style.color = palette.muted; e.currentTarget.style.background = 'transparent'; }}
                >
                  <IconPlus />
                </button>
              )}
            </div>

            {/* Sidebar content */}
            <div style={{
              flex: 1, minHeight: 0,
              opacity: open ? 1 : 0,
              pointerEvents: open ? 'auto' : 'none',
              transition: open ? 'opacity 260ms ease 120ms' : 'opacity 120ms ease',
              display: 'flex', flexDirection: 'column',
            }}>
              <div style={{
                padding: '2px 20px 14px',
                fontSize: 11, letterSpacing: '0.14em',
                textTransform: 'uppercase', color: palette.faint, fontWeight: 500,
              }}>
                History
              </div>

              <div style={{ flex: 1, minHeight: 0, overflowY: 'auto', padding: '0 8px 12px' }}>
                {notes.length === 0 ? (
                  <div style={{
                    padding: '32px 12px', color: palette.faint,
                    fontSize: 13, fontStyle: 'italic',
                  }}>
                    No saved notes yet.
                  </div>
                ) : (
                  notes.map(n => {
                    const isActive = n.id === activeId;
                    const isHover = n.id === hoverId;
                    return (
                      <div
                        key={n.id}
                        onMouseEnter={() => setHoverId(n.id)}
                        onMouseLeave={() => setHoverId(h => h === n.id ? null : h)}
                        onClick={() => selectNote(n)}
                        style={{
                          position: 'relative',
                          padding: '9px 12px 10px 14px',
                          borderRadius: 6, cursor: 'pointer',
                          background: isActive ? palette.activeBg : (isHover ? palette.hoverBg : 'transparent'),
                          transition: 'background 120ms', marginBottom: 1,
                        }}
                      >
                        {isActive && (
                          <span style={{
                            position: 'absolute', left: 4, top: 10, bottom: 10,
                            width: 2, borderRadius: 2, background: palette.accent,
                          }} />
                        )}
                        <div style={{
                          fontSize: 13, lineHeight: 1.35,
                          color: palette.fg, fontWeight: isActive ? 500 : 400,
                          whiteSpace: 'nowrap', overflow: 'hidden',
                          textOverflow: 'ellipsis', paddingRight: 22,
                        }}>
                          {truncate(n.title || n.body, 40)}
                        </div>
                        <div style={{ fontSize: 11, color: palette.faint, marginTop: 2, letterSpacing: '0.01em' }}>
                          {n.ts}
                        </div>
                        <button
                          aria-label="Delete note"
                          onClick={e => { e.stopPropagation(); requestDelete(n); }}
                          style={{
                            position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)',
                            width: 22, height: 22, borderRadius: 5,
                            border: 'none', background: 'transparent', color: palette.muted,
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                            cursor: 'pointer', opacity: isHover ? 1 : 0,
                            transition: 'opacity 140ms, background 140ms, color 140ms',
                          }}
                          onMouseEnter={e => { e.currentTarget.style.background = isDark ? 'rgba(235,232,224,0.08)' : 'rgba(30,28,24,0.06)'; e.currentTarget.style.color = palette.fg; }}
                          onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = palette.muted; }}
                        >
                          <IconTrash />
                        </button>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </aside>

          {/* Editor */}
          <main style={{
            flex: 1, minWidth: 0, position: 'relative',
            display: 'flex', justifyContent: 'center',
            background: palette.bg,
          }}>
            <button
              onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
              aria-label={isDark ? 'Switch to light mode' : 'Switch to dark mode'}
              style={{
                position: 'absolute', top: 12, right: 14,
                width: 32, height: 32, borderRadius: 8,
                border: 'none', background: 'transparent', color: palette.muted,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                cursor: 'pointer', zIndex: 3,
                transition: 'color 160ms, background 160ms',
              }}
              onMouseEnter={e => { e.currentTarget.style.color = palette.fg; e.currentTarget.style.background = palette.hoverBg; }}
              onMouseLeave={e => { e.currentTarget.style.color = palette.muted; e.currentTarget.style.background = 'transparent'; }}
            >
              {isDark ? <IconSun /> : <IconMoon />}
            </button>

            <textarea
              ref={taRef}
              value={text}
              onChange={e => setText(e.target.value)}
              placeholder="Paste or start typing…"
              spellCheck={false}
              style={{
                width: '100%', maxWidth: 760, height: '100%',
                padding: '72px 56px 96px',
                border: 'none', outline: 'none', resize: 'none',
                background: 'transparent', color: palette.fg,
                fontFamily: '"Source Serif 4", "Source Serif Pro", Georgia, serif',
                fontSize: 17, lineHeight: 1.7, letterSpacing: '0.005em',
                caretColor: palette.accent,
              }}
            />
            <style>{`
              textarea::placeholder { color: ${palette.faint}; font-style: italic; }
              textarea::selection { background: ${isDark ? 'rgba(214,201,168,0.22)' : 'rgba(107,91,62,0.18)'}; }
            `}</style>
          </main>

          {/* Undo snackbar */}
          {pendingDelete && (
            <div style={{
              position: 'absolute', left: '50%', bottom: 24,
              transform: 'translateX(-50%)',
              display: 'flex', alignItems: 'center', gap: 14,
              padding: '9px 12px 9px 16px',
              background: isDark ? 'rgba(30,28,24,0.95)' : 'rgba(30,28,24,0.92)',
              color: '#faf8f3', borderRadius: 8, fontSize: 13, zIndex: 4,
              boxShadow: '0 2px 12px rgba(0,0,0,0.15)',
            }}>
              <span style={{ opacity: 0.85 }}>Note deleted</span>
              <button
                onClick={undoDelete}
                style={{
                  appearance: 'none', border: 'none', background: 'transparent',
                  color: '#d6c9a8', cursor: 'pointer', fontSize: 13, fontWeight: 500, padding: '2px 4px',
                }}
              >Undo</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Scratchpad />);
  </script>
</body>
</html>
