<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratchpad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body { -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.25); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,0.45); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const STORAGE_KEY = 'scratchpad:data';

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : { notes: [], theme: 'light', fontSize: 17 };
      } catch { return { notes: [], theme: 'light', fontSize: 17 }; }
    }

    function saveData(notes, theme, fontSize) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ notes, theme, fontSize }));
      } catch {}
    }

    function genId() {
      return `n${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
    }

    function formatTs() {
      const d = new Date();
      const today = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      const noteDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      if (noteDay.getTime() === today.getTime()) return `Today · ${time}`;
      if (noteDay.getTime() === yesterday.getTime()) return 'Yesterday';
      return d.toLocaleDateString([], { weekday: 'short' });
    }

    function truncate(s, n = 40) {
      const firstLine = (s || '').split('\n')[0].trim();
      if (!firstLine) return 'Untitled';
      return firstLine.length > n ? firstLine.slice(0, n).trimEnd() + '…' : firstLine;
    }

    function IconChevronRight({ size = 18 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="9 6 15 12 9 18" />
        </svg>
      );
    }
    function IconChevronLeft({ size = 18 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="15 6 9 12 15 18" />
        </svg>
      );
    }
    function IconTrash({ size = 14 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M4 7h16" />
          <path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
          <path d="M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-12" />
        </svg>
      );
    }
    function IconPlus({ size = 16 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      );
    }
    function IconSun({ size = 16 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="4" />
          <line x1="12" y1="3" x2="12" y2="5" /><line x1="12" y1="19" x2="12" y2="21" />
          <line x1="3" y1="12" x2="5" y2="12" /><line x1="19" y1="12" x2="21" y2="12" />
          <line x1="5.6" y1="5.6" x2="7" y2="7" /><line x1="17" y1="17" x2="18.4" y2="18.4" />
          <line x1="5.6" y1="18.4" x2="7" y2="17" /><line x1="17" y1="7" x2="18.4" y2="5.6" />
        </svg>
      );
    }
    function IconMoon({ size = 16 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
        </svg>
      );
    }

    function Scratchpad() {
      const initial = React.useMemo(() => loadData(), []);

      const [theme, setTheme] = React.useState(initial.theme || 'light');
      const [open, setOpen] = React.useState(false);
      const [notes, setNotes] = React.useState(initial.notes || []);
      const [activeId, setActiveId] = React.useState(null);
      const [text, setText] = React.useState('');
      const [hoverId, setHoverId] = React.useState(null);
      const [pendingDelete, setPendingDelete] = React.useState(null);
      const [fontSize, setFontSize] = React.useState(initial.fontSize || 17);
      // mobile: sidebar overlays editor on narrow screens
      const [isMobile, setIsMobile] = React.useState(window.innerWidth < 640);

      const undoTimer = React.useRef(null);
      const taRef = React.useRef(null);

      const textRef = React.useRef(text);
      const activeIdRef = React.useRef(activeId);
      const notesRef = React.useRef(notes);
      const themeRef = React.useRef(theme);
      const fontSizeRef = React.useRef(fontSize);
      React.useEffect(() => { textRef.current = text; }, [text]);
      React.useEffect(() => { activeIdRef.current = activeId; }, [activeId]);
      React.useEffect(() => { notesRef.current = notes; }, [notes]);
      React.useEffect(() => { themeRef.current = theme; }, [theme]);
      React.useEffect(() => { fontSizeRef.current = fontSize; }, [fontSize]);

      // Persist theme + fontSize changes immediately
      React.useEffect(() => {
        saveData(notesRef.current, theme, fontSizeRef.current);
      }, [theme]);
      React.useEffect(() => {
        saveData(notesRef.current, themeRef.current, fontSize);
      }, [fontSize]);

      // Responsive listener
      React.useEffect(() => {
        const onResize = () => setIsMobile(window.innerWidth < 640);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      // Close sidebar when clicking editor on mobile
      const handleEditorClick = () => {
        if (isMobile && open) setOpen(false);
      };

      // Save on exit
      React.useEffect(() => {
        const handleUnload = () => {
          const t = textRef.current.trim();
          const currentNotes = notesRef.current;
          const aid = activeIdRef.current;
          if (!t) { saveData(currentNotes, themeRef.current, fontSizeRef.current); return; }
          const ts = formatTs();
          let updated;
          if (aid) {
            updated = currentNotes.map(n =>
              n.id === aid ? { ...n, body: textRef.current, title: textRef.current, ts } : n
            );
          } else {
            updated = [{ id: genId(), title: textRef.current, body: textRef.current, ts }, ...currentNotes];
          }
          saveData(updated, themeRef.current, fontSizeRef.current);
        };
        window.addEventListener('beforeunload', handleUnload);
        return () => window.removeEventListener('beforeunload', handleUnload);
      }, []);

      React.useEffect(() => {
        if (taRef.current) taRef.current.focus();
      }, []);

      // Auto-save: 1.5s after the user stops typing
      React.useEffect(() => {
        if (!text.trim()) return;
        const timer = setTimeout(() => {
          const ts = formatTs();
          const currentNotes = notesRef.current;
          const aid = activeIdRef.current;
          if (aid) {
            const updated = currentNotes.map(n =>
              n.id === aid ? { ...n, body: text, title: text, ts } : n
            );
            setNotes(updated);
            saveData(updated, themeRef.current, fontSizeRef.current);
          } else {
            const newId = genId();
            const newEntry = { id: newId, title: text, body: text, ts };
            const updated = [newEntry, ...currentNotes];
            setNotes(updated);
            setActiveId(newId);
            saveData(updated, themeRef.current, fontSizeRef.current);
          }
        }, 1500);
        return () => clearTimeout(timer);
      }, [text]);

      const isDark = theme === 'dark';

      const palette = isDark ? {
        bg: '#131311',
        fg: 'rgba(235,232,224,0.92)',
        muted: 'rgba(235,232,224,0.50)',
        faint: 'rgba(235,232,224,0.30)',
        line: 'rgba(235,232,224,0.08)',
        sidebarBg: '#1a1a17',
        activeBg: 'rgba(235,232,224,0.06)',
        hoverBg: 'rgba(235,232,224,0.035)',
        accent: '#d6c9a8',
        divider: 'rgba(235,232,224,0.08)',
      } : {
        bg: '#ffffff',
        fg: 'rgba(20,20,22,0.92)',
        muted: 'rgba(20,20,22,0.50)',
        faint: 'rgba(20,20,22,0.34)',
        line: 'rgba(20,20,22,0.07)',
        sidebarBg: '#fafafa',
        activeBg: 'rgba(20,20,22,0.055)',
        hoverBg: 'rgba(20,20,22,0.03)',
        accent: '#2a2a2e',
        divider: 'rgba(20,20,22,0.07)',
      };

      const editorFont = '"Geist", -apple-system, BlinkMacSystemFont, "SF Pro Text", ui-sans-serif, system-ui, sans-serif';

      const selectNote = (n) => {
        // Save current text before switching
        const t = text.trim();
        if (t) {
          const ts = formatTs();
          if (activeId && activeId !== n.id) {
            const updated = notes.map(x =>
              x.id === activeId ? { ...x, body: text, title: text, ts } : x
            );
            setNotes(updated);
            saveData(updated, theme, fontSize);
          } else if (!activeId) {
            const newEntry = { id: genId(), title: text, body: text, ts };
            const updated = [newEntry, ...notes];
            setNotes(updated);
            saveData(updated, theme, fontSize);
          }
        }
        setActiveId(n.id);
        setText(n.body);
        if (isMobile) setOpen(false);
        if (taRef.current) taRef.current.focus();
      };

      const requestDelete = (n) => {
        const idx = notes.findIndex(x => x.id === n.id);
        const updated = notes.filter(x => x.id !== n.id);
        setNotes(updated);
        saveData(updated, theme, fontSize);
        if (activeId === n.id) { setActiveId(null); setText(''); }
        setPendingDelete({ note: n, index: idx });
        if (undoTimer.current) clearTimeout(undoTimer.current);
        undoTimer.current = setTimeout(() => setPendingDelete(null), 4000);
      };

      const undoDelete = () => {
        if (!pendingDelete) return;
        const { note, index } = pendingDelete;
        const next = [...notes];
        next.splice(Math.min(index, next.length), 0, note);
        setNotes(next);
        saveData(next, theme, fontSize);
        setPendingDelete(null);
        if (undoTimer.current) clearTimeout(undoTimer.current);
      };

      const newNote = () => {
        // Save current text before starting fresh
        const t = text.trim();
        if (t) {
          const ts = formatTs();
          if (activeId) {
            const updated = notes.map(n =>
              n.id === activeId ? { ...n, body: text, title: text, ts } : n
            );
            setNotes(updated);
            saveData(updated, theme, fontSize);
          } else {
            const newEntry = { id: genId(), title: text, body: text, ts };
            const updated = [newEntry, ...notes];
            setNotes(updated);
            saveData(updated, theme, fontSize);
          }
        }
        setActiveId(null);
        setText('');
        if (isMobile) setOpen(false);
        if (taRef.current) taRef.current.focus();
      };

      const changeFontSize = (delta) => {
        setFontSize(s => Math.min(28, Math.max(12, s + delta)));
      };

      const iconBtn = (extra = {}) => ({
        appearance: 'none', background: 'transparent', border: 'none',
        color: palette.muted, cursor: 'pointer',
        width: 28, height: 28, borderRadius: 6,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'color 140ms, background 140ms',
        ...extra,
      });

      const sidebarWidth = 272;

      return (
        <div style={{
          position: 'relative', width: '100%', height: '100%',
          background: palette.bg, color: palette.fg,
          fontFamily: '"Inter", ui-sans-serif, system-ui, sans-serif',
          overflow: 'hidden', display: 'flex',
        }}>

          {/* Mobile overlay backdrop */}
          {isMobile && open && (
            <div
              onClick={() => setOpen(false)}
              style={{
                position: 'absolute', inset: 0, zIndex: 3,
                background: 'rgba(0,0,0,0.32)',
              }}
            />
          )}

          {/* Sidebar */}
          <aside aria-label="History" style={{
            position: isMobile ? 'absolute' : 'relative',
            top: isMobile ? 0 : undefined,
            left: isMobile ? 0 : undefined,
            bottom: isMobile ? 0 : undefined,
            flex: isMobile ? undefined : '0 0 auto',
            width: open ? sidebarWidth : 44,
            transition: 'width 360ms cubic-bezier(.2,.7,.2,1)',
            borderRight: `1px solid ${open ? palette.line : 'transparent'}`,
            background: open ? palette.sidebarBg : palette.bg,
            display: 'flex', flexDirection: 'column',
            zIndex: isMobile ? 4 : 2,
            height: isMobile ? '100%' : undefined,
          }}>
            {/* Top bar */}
            <div style={{
              height: 44, display: 'flex', alignItems: 'center',
              padding: open ? '0 10px 0 14px' : '0',
              justifyContent: open ? 'space-between' : 'center',
              flexShrink: 0,
            }}>
              <button
                onClick={() => setOpen(o => !o)}
                aria-label={open ? 'Collapse history' : 'Expand history'}
                style={iconBtn()}
                onMouseEnter={e => { e.currentTarget.style.color = palette.fg; e.currentTarget.style.background = palette.hoverBg; }}
                onMouseLeave={e => { e.currentTarget.style.color = palette.muted; e.currentTarget.style.background = 'transparent'; }}
              >
                {open ? <IconChevronLeft /> : <IconChevronRight />}
              </button>
              {open && (
                <button
                  onClick={newNote}
                  aria-label="New note"
                  style={iconBtn()}
                  onMouseEnter={e => { e.currentTarget.style.color = palette.fg; e.currentTarget.style.background = palette.hoverBg; }}
                  onMouseLeave={e => { e.currentTarget.style.color = palette.muted; e.currentTarget.style.background = 'transparent'; }}
                >
                  <IconPlus />
                </button>
              )}
            </div>

            {/* Sidebar content — fades in when open */}
            <div style={{
              flex: 1, minHeight: 0,
              opacity: open ? 1 : 0,
              pointerEvents: open ? 'auto' : 'none',
              transition: open ? 'opacity 260ms ease 120ms' : 'opacity 120ms ease',
              display: 'flex', flexDirection: 'column',
            }}>
              <div style={{
                padding: '2px 20px 14px',
                fontSize: 11, letterSpacing: '0.14em',
                textTransform: 'uppercase', color: palette.faint, fontWeight: 500,
                flexShrink: 0,
              }}>
                History
              </div>

              {/* Note list */}
              <div style={{ flex: 1, minHeight: 0, overflowY: 'auto', padding: '0 8px 8px' }}>
                {notes.length === 0 ? (
                  <div style={{
                    padding: '32px 12px', color: palette.faint,
                    fontSize: 13, fontStyle: 'italic',
                  }}>
                    No saved notes yet.
                  </div>
                ) : (
                  notes.map(n => {
                    const isActive = n.id === activeId;
                    const isHover = n.id === hoverId;
                    return (
                      <div
                        key={n.id}
                        onMouseEnter={() => setHoverId(n.id)}
                        onMouseLeave={() => setHoverId(h => h === n.id ? null : h)}
                        onClick={() => selectNote(n)}
                        style={{
                          position: 'relative',
                          padding: '9px 12px 10px 14px',
                          borderRadius: 6, cursor: 'pointer',
                          background: isActive ? palette.activeBg : (isHover ? palette.hoverBg : 'transparent'),
                          transition: 'background 120ms', marginBottom: 1,
                        }}
                      >
                        {isActive && (
                          <span style={{
                            position: 'absolute', left: 4, top: 10, bottom: 10,
                            width: 2, borderRadius: 2, background: palette.accent,
                          }} />
                        )}
                        <div style={{
                          fontSize: 13, lineHeight: 1.35, color: palette.fg,
                          fontWeight: isActive ? 500 : 400,
                          whiteSpace: 'nowrap', overflow: 'hidden',
                          textOverflow: 'ellipsis', paddingRight: 22,
                        }}>
                          {truncate(n.title || n.body, 40)}
                        </div>
                        <div style={{ fontSize: 11, color: palette.faint, marginTop: 2, letterSpacing: '0.01em' }}>
                          {n.ts}
                        </div>
                        <button
                          aria-label="Delete note"
                          onClick={e => { e.stopPropagation(); requestDelete(n); }}
                          style={{
                            position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)',
                            width: 22, height: 22, borderRadius: 5,
                            border: 'none', background: 'transparent', color: palette.muted,
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                            cursor: 'pointer', opacity: isHover ? 1 : 0,
                            transition: 'opacity 140ms, background 140ms, color 140ms',
                          }}
                          onMouseEnter={e => { e.currentTarget.style.background = isDark ? 'rgba(235,232,224,0.08)' : 'rgba(30,28,24,0.06)'; e.currentTarget.style.color = palette.fg; }}
                          onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = palette.muted; }}
                        >
                          <IconTrash />
                        </button>
                      </div>
                    );
                  })
                )}
              </div>

              {/* Font size control — bottom of sidebar */}
              <div style={{
                flexShrink: 0,
                borderTop: `1px solid ${palette.divider}`,
                padding: '12px 16px',
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              }}>
                <span style={{ fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase', color: palette.faint, fontWeight: 500 }}>
                  Text size
                </span>
                <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                  <button
                    onClick={() => changeFontSize(-1)}
                    aria-label="Decrease font size"
                    disabled={fontSize <= 12}
                    style={{
                      width: 26, height: 26, borderRadius: 5, border: 'none',
                      background: 'transparent', color: fontSize <= 12 ? palette.faint : palette.muted,
                      cursor: fontSize <= 12 ? 'default' : 'pointer',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 16, fontWeight: 400, lineHeight: 1,
                      transition: 'color 120ms, background 120ms',
                    }}
                    onMouseEnter={e => { if (fontSize > 12) { e.currentTarget.style.color = palette.fg; e.currentTarget.style.background = palette.hoverBg; } }}
                    onMouseLeave={e => { e.currentTarget.style.color = fontSize <= 12 ? palette.faint : palette.muted; e.currentTarget.style.background = 'transparent'; }}
                  >−</button>
                  <span style={{ fontSize: 12, color: palette.muted, minWidth: 24, textAlign: 'center', fontVariantNumeric: 'tabular-nums' }}>
                    {fontSize}
                  </span>
                  <button
                    onClick={() => changeFontSize(1)}
                    aria-label="Increase font size"
                    disabled={fontSize >= 28}
                    style={{
                      width: 26, height: 26, borderRadius: 5, border: 'none',
                      background: 'transparent', color: fontSize >= 28 ? palette.faint : palette.muted,
                      cursor: fontSize >= 28 ? 'default' : 'pointer',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 16, fontWeight: 400, lineHeight: 1,
                      transition: 'color 120ms, background 120ms',
                    }}
                    onMouseEnter={e => { if (fontSize < 28) { e.currentTarget.style.color = palette.fg; e.currentTarget.style.background = palette.hoverBg; } }}
                    onMouseLeave={e => { e.currentTarget.style.color = fontSize >= 28 ? palette.faint : palette.muted; e.currentTarget.style.background = 'transparent'; }}
                  >+</button>
                </div>
              </div>
            </div>
          </aside>

          {/* Main editor */}
          <main
            onClick={handleEditorClick}
            style={{
              flex: 1, minWidth: 0, position: 'relative',
              display: 'flex', flexDirection: 'column',
              background: palette.bg,
              // on mobile, editor stays full-width behind the overlay
              marginLeft: isMobile ? 44 : 0,
            }}
          >
            {/* Theme toggle */}
            <button
              onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
              aria-label={isDark ? 'Switch to light mode' : 'Switch to dark mode'}
              style={{
                position: 'absolute', top: 12, right: 16,
                width: 32, height: 32, borderRadius: 8,
                border: 'none', background: 'transparent', color: palette.muted,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                cursor: 'pointer', zIndex: 1,
                transition: 'color 160ms, background 160ms',
              }}
              onMouseEnter={e => { e.currentTarget.style.color = palette.fg; e.currentTarget.style.background = palette.hoverBg; }}
              onMouseLeave={e => { e.currentTarget.style.color = palette.muted; e.currentTarget.style.background = 'transparent'; }}
            >
              {isDark ? <IconSun /> : <IconMoon />}
            </button>

            <textarea
              ref={taRef}
              value={text}
              onChange={e => setText(e.target.value)}
              placeholder="Paste or start typing…"
              spellCheck={false}
              style={{
                flex: 1,
                width: '100%',
                padding: '64px 10% 80px 10%',
                border: 'none', outline: 'none', resize: 'none',
                background: 'transparent', color: palette.fg,
                fontFamily: editorFont,
                fontSize: fontSize,
                lineHeight: 1.75,
                letterSpacing: '0.005em',
                caretColor: palette.accent,
                overflowY: 'auto',
              }}
            />
            <style>{`
              textarea::placeholder { color: ${palette.faint}; font-style: italic; }
              textarea::selection { background: ${isDark ? 'rgba(214,201,168,0.22)' : 'rgba(107,91,62,0.18)'}; }
            `}</style>
          </main>

          {/* Undo snackbar */}
          {pendingDelete && (
            <div style={{
              position: 'absolute', left: '50%', bottom: 24,
              transform: 'translateX(-50%)',
              display: 'flex', alignItems: 'center', gap: 14,
              padding: '9px 12px 9px 16px',
              background: isDark ? 'rgba(30,28,24,0.95)' : 'rgba(30,28,24,0.92)',
              color: '#faf8f3', borderRadius: 8, fontSize: 13, zIndex: 5,
              boxShadow: '0 2px 12px rgba(0,0,0,0.15)',
              whiteSpace: 'nowrap',
            }}>
              <span style={{ opacity: 0.85 }}>Note deleted</span>
              <button
                onClick={undoDelete}
                style={{
                  appearance: 'none', border: 'none', background: 'transparent',
                  color: '#d6c9a8', cursor: 'pointer', fontSize: 13, fontWeight: 500, padding: '2px 4px',
                }}
              >Undo</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Scratchpad />);
  </script>
</body>
</html>
